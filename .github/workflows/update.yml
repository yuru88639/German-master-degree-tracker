name: Update Program Data

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data/programs.csv'
      - 'README.md'
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: 'pip'
          cache-dependency-path: |
            **/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 关键修改：检查 requirements.txt 在哪里
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f src/requirements.txt ]; then
            pip install -r src/requirements.txt
          else
            echo "⚠️ requirements.txt not found!"
            exit 1
          fi

      - name: Run scraper
        run: |
          # 尝试不同的可能入口
          if [ -f src/main.py ]; then
            python src/main.py
          elif [ -f main.py ]; then
            python main.py
          else
            echo "⚠️ main.py not found!"
            exit 1
          fi
        continue-on-error: true

      - name: Check for changes
        id: git-check
        run: |
          # 检查数据文件是否有变化（可能在根目录或data文件夹）
          if [ -f programs.csv ]; then
            git add programs.csv -n
          elif [ -f data/programs.csv ]; then
            git add data/programs.csv -n
          else
            echo "⚠️ No data file found"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加数据文件（可能在根目录或data文件夹）
          if [ -f programs.csv ]; then
            git add programs.csv
          elif [ -f data/programs.csv ]; then
            git add data/programs.csv
          fi
          
          git commit -m "Auto update data [skip ci]"
          git push
          
          echo "✅ Successfully updated data file"

      - name: Send notification
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ Workflow completed successfully!"
          else
            echo "❌ Workflow failed. Check the logs above."
